stair_mode_controller:
  ros__parameters:
    odom_topic: /odin/odometry_high
    control_topic: /keyboard_control

    map_to_odom_x: 0.86
    map_to_odom_y: 2.25
    map_to_odom_yaw_deg: 90.0

    x_min: 4.200
    x_max: 5.200
    y_min: 2.000
    y_max: 3.500

    target_yaw_deg: -90.0
    yaw_tolerance_deg: 60.0

    flat_length_leg: 1
    stair_length_leg: 2
    spin_mode: 0
